site_name: Ikirati Documentation
site_description: Documentation for the Ikirati Cultural Heritage Platform
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - scheme: default
      primary: teal
      accent: purple
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

nav:
  - Home: index.md
  - Backend: backend/index.md
  - Frontend: frontend/index.md
